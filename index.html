<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pink Blue Photobooth</title>
    <style>
        /* ========================================================
           TEMA WARNA RETRO BIRU PINK (VAPORWAVE / Y2K AESTHETIC)
           ======================================================== */
        :root {
            --bg-gradient: linear-gradient(135deg, #00f5d4 0%, #00bbf9 40%, #ff007f 100%);
            --btn-pink: #ff007f;
            --btn-blue: #00bbf9;
            --dark-retro: #1e1e24;
            --frame-bg: #ffffff; /* Tetap putih mempertahankan ala polaroid */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Impact', 'Arial Black', 'Poppins', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            color: #fff;
            text-shadow: 4px 4px 0px var(--btn-pink), -2px -2px 0px var(--btn-blue);
            margin-bottom: 25px;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 2px;
            font-style: italic;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 100%;
            max-width: 850px;
            justify-items: center;
            align-items: start;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1.2fr 0.8fr;
                gap: 40px;
            }
        }

        /* Area Kamera & Kontrol Retro */
        .camera-box {
            background: rgba(30, 30, 36, 0.9);
            border: 4px solid #fff;
            border-radius: 0px; /* Sudut tajam khas retro PC */
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 10px 10px 0px var(--btn-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .video-wrapper {
            width: 100%;
            position: relative;
            aspect-ratio: 4/3;
            background-color: #000;
            border: 3px solid var(--btn-blue);
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            transition: filter 0.3s ease;
        }

        /* Navigasi Pilihan Filter Warna Retro */
        .filter-selector {
            width: 100%;
            margin: 15px 0 5px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
        }

        .filter-label {
            font-size: 13px;
            font-weight: bold;
            color: var(--btn-blue);
            text-shadow: 1px 1px 0px #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-options {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 5px;
        }

        .filter-btn {
            padding: 6px 14px;
            font-size: 12px;
            font-family: 'Segoe UI', sans-serif;
            background: #2f2f38;
            border: 2px solid var(--btn-blue);
            color: #fff;
            border-radius: 0px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--btn-pink);
            border-color: #fff;
            font-weight: bold;
            box-shadow: 3px 3px 0px var(--btn-blue);
            transform: translate(-2px, -2px);
        }

        /* Filter Efek Gambar */
        .f-normal { filter: none; }
        .f-bw { filter: grayscale(100%) contrast(120%); }
        .f-sepia { filter: sepia(100%) hue-rotate(-30deg); }
        .f-vintage { filter: sepia(30%) contrast(130%) saturate(140%); }
        .f-cyber { filter: hue-rotate(140deg) saturate(180%) contrast(120%); }

        #timer {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 90px;
            font-weight: 900;
            color: #fff;
            text-shadow: 4px 4px 0px var(--btn-pink);
            pointer-events: none;
            z-index: 10;
        }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .flash-effect {
            animation: flash 0.4s ease-out;
        }

        @keyframes flash {
            0% { background: rgba(255,255,255,1); }
            100% { background: rgba(255,255,255,0); }
        }

        /* Desain Tombol-Tombol Blocky Retro */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        button.main-btn {
            padding: 12px 15px;
            font-size: 14px;
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 3px solid #fff;
            border-radius: 0px; /* Kotak kaku khas 90s game */
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 4px 4px 0px #000;
        }

        button.main-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        #initBtn { background-color: var(--btn-blue); color: #fff; }
        #captureBtn { background-color: var(--btn-pink); color: white; }
        #downloadBtn { background-color: #00f5d4; color: #1e1e24; }
        
        button.main-btn:disabled {
            background-color: #555 !important;
            color: #888 !important;
            box-shadow: none;
            transform: none;
            border-color: #444;
            cursor: not-allowed;
        }

        /* MEMPERTAHANKAN TAMPILAN STRIP POLAROID ASLI (PUTIH BERSIH) */
        .photobooth-frame {
            background-color: var(--frame-bg);
            width: 220px;
            padding: 15px 15px 55px 15px;
            box-shadow: 8px 8px 0px var(--dark-retro);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            position: relative;
            border: 1px solid #dcdde1;
        }

        .slot {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #f1f2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a4b0be;
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            overflow: hidden;
            border: 1px solid #f1f2f6;
        }

        .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Input Teks Cetak Polaroid */
        .frame-footer-input {
            position: absolute;
            bottom: 15px;
            width: calc(100% - 30px);
            border: none;
            background: transparent;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: #2f3542;
            outline: none;
            border-bottom: 1px dashed transparent;
        }

        .frame-footer-input:hover, .frame-footer-input:focus {
            border-bottom: 1px dashed #ced6e0;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <h1>⚡ VAPORWAVE PHOTOBOOTH ⚡</h1>
    
    <div class="container">
        <div class="camera-box">
            <div class="video-wrapper">
                <video id="video" class="f-normal" autoplay playsinline></video>
                <div class="flash-overlay" id="flash"></div>
            </div>
            <div id="timer"></div>

            <div class="filter-selector">
                <span class="filter-label">📟 FILTER MODE:</span>
                <div class="filter-options">
                    <button class="filter-btn active" onclick="setFilter('normal', this)">Normal</button>
                    <button class="filter-btn" onclick="setFilter('bw', this)">B&W</button>
                    <button class="filter-btn" onclick="setFilter('sepia', this)">Sepia</button>
                    <button class="filter-btn" onclick="setFilter('vintage', this)">Vintage</button>
                    <button class="filter-btn" onclick="setFilter('cyber', this)">Cyberpunk</button>
                </div>
            </div>
            
            <div class="controls">
                <button id="initBtn" class="main-btn">1. LOAD CAMERA</button>
                <div class="btn-group">
                    <button id="captureBtn" class="main-btn" disabled>2. START (3s)</button>
                    <button id="downloadBtn" class="main-btn" disabled>3. SAVE STRIP</button>
                </div>
            </div>
        </div>

        <div class="photobooth-frame" id="photoFrame">
            <div class="slot" id="slot1">SLOT 1</div>
            <div class="slot" id="slot2">SLOT 2</div>
            <div class="slot" id="slot3">SLOT 3</div>
            <div class="slot" id="slot4">SLOT 4</div>
            <input type="text" class="frame-footer-input" id="footerText" value="RAD MEMORIES ✨" placeholder="Tulis catatan...">
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const timerDisplay = document.getElementById('timer');
        const initBtn = document.getElementById('initBtn');
        const captureBtn = document.getElementById('captureBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const flash = document.getElementById('flash');
        const footerTextInput = document.getElementById('footerText');
        
        const slots = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3'),
            document.getElementById('slot4')
        ];

        let imgDataArray = [null, null, null, null];
        let activeFilter = 'normal';
        const ctx = canvas.getContext('2d');

        function setFilter(filterName, btn) {
            video.className = ''; 
            video.classList.add('f-' + filterName);
            activeFilter = filterName;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Akses Kamera
        initBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                captureBtn.disabled = false;
                initBtn.disabled = true;
                initBtn.innerText = "CAMERA ONLINE";
            } catch (err) {
                alert("Gagal mengakses kamera. Mohon izinkan akses kamera.");
                console.error(err);
            }
        });

        // Sesi Foto Otomatis 3 Detik
        captureBtn.addEventListener('click', () => {
            captureBtn.disabled = true;
            downloadBtn.disabled = true;
            clearSlots();
            
            let currentSlot = 0;
            
            function startCountdown() {
                let count = 3;
                timerDisplay.innerText = count;
                
                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        timerDisplay.innerText = count;
                    } else {
                        clearInterval(interval);
                        timerDisplay.innerText = "";
                        
                        flash.classList.add('flash-effect');
                        setTimeout(() => flash.classList.remove('flash-effect'), 400);

                        takeSnapshot(currentSlot);
                        
                        currentSlot++;
                        if (currentSlot < 4) {
                            setTimeout(startCountdown, 1000);
                        } else {
                            setTimeout(() => {
                                timerDisplay.innerText = "SUCCESS!";
                                setTimeout(() => timerDisplay.innerText = "", 1500);
                                captureBtn.disabled = false;
                                downloadBtn.disabled = false;
                            }, 1000);
                        }
                    }
                }, 1000);
            }
            
            startCountdown();
        });

        function takeSnapshot(slotIndex) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyFilterToCanvas(ctx);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imgUrl = canvas.toDataURL('image/jpeg');
            imgDataArray[slotIndex] = imgUrl;
            
            slots[slotIndex].innerHTML = `<img src="${imgUrl}" class="f-${activeFilter}" alt="Foto ${slotIndex + 1}">`;
        }

        function applyFilterToCanvas(context) {
            if (activeFilter === 'bw') context.filter = 'grayscale(100%) contrast(120%)';
            else if (activeFilter === 'sepia') context.filter = 'sepia(100%) hue-rotate(-30deg)';
            else if (activeFilter === 'vintage') context.filter = 'sepia(30%) contrast(130%) saturate(140%)';
            else if (activeFilter === 'cyber') context.filter = 'hue-rotate(140deg) saturate(180%) contrast(120%)';
            else context.filter = 'none';
        }

        function clearSlots() {
            slots.forEach((slot, index) => { slot.innerHTML = `SLOT ${index + 1}`; });
            imgDataArray = [null, null, null, null];
        }

        // Menggabungkan Menjadi Cetakan Polaroid Putih Bersih
        downloadBtn.addEventListener('click', () => {
            const finalWidth = 450;
            const padding = 25;
            const gap = 20;
            const photoWidth = finalWidth - (padding * 2);
            const photoHeight = photoWidth * (3/4); 
            const bottomSpace = 85; 
            
            const finalHeight = (padding * 2) + (photoHeight * 4) + (gap * 3) + bottomSpace;
            
            canvas.width = finalWidth;
            canvas.height = finalHeight;

            ctx.filter = 'none';
            ctx.fillStyle = "#ffffff"; /* Kertas polaroid putih dipertahankan */
            ctx.fillRect(0, 0, finalWidth, finalHeight);

            ctx.strokeStyle = "#e4e4e4";
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, finalWidth - 2, finalHeight - 2);

            let loadedImages = 0;

            imgDataArray.forEach((dataUrl, index) => {
                if (!dataUrl) return;
                
                const img = new Image();
                img.src = dataUrl;
                img.onload = () => {
                    const yPos = padding + (index * (photoHeight + gap));
                    
                    ctx.save();
                    ctx.translate(padding + photoWidth, yPos);
                    ctx.scale(-1, 1); // Efek Cermin
                    
                    applyFilterToCanvas(ctx);
                    
                    const targetRatio = photoWidth / photoHeight;
                    let sX = 0, sY = 0, sWidth = img.width, sHeight = img.height;

                    if (img.width / img.height > targetRatio) {
                        sWidth = img.height * targetRatio;
                        sX = (img.width - sWidth) / 2;
                    } else {
                        sHeight = img.width / targetRatio;
                        sY = (img.height - sHeight) / 2;
                    }

                    ctx.drawImage(img, sX, sY, sWidth, sHeight, 0, 0, photoWidth, photoHeight);
                    ctx.restore();

                    ctx.filter = 'none';
                    ctx.strokeStyle = "#f1f2f6";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(padding, yPos, photoWidth, photoHeight);
                    
                    loadedImages++;
                    
                    if (loadedImages === 4) {
                        ctx.fillStyle = "#2f3542";
                        ctx.font = "bold 22px 'Courier New', Courier, monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(footerTextInput.value, finalWidth / 2, finalHeight - 35);

                        triggerDownload();
                    }
                };
            });
        });

        function triggerDownload() {
            const finalDataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'vapor-polaroid-' + Date.now() + '.jpg';
            link.href = finalDataUrl;
            link.click();
        }
    </script>
</body>
</html>
