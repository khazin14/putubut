<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earth Tone Polaroid Photobooth</title>
    <style>
        /* ========================================================
           TEMA WARNA EARTH TONE (WARNA ALAM ESTETIK)
           ======================================================== */
        :root {
            --earth-terracotta: #b85d43; /* Cokelat kemerahan / terakota */
            --earth-sage: #708266;       /* Hijau daun sage */
            --earth-wood: #4a3b32;       /* Cokelat tua kayu */
            --earth-sand: #f4f0ea;       /* Krem pasir lembut */
            --frame-bg: #ffffff;         /* Tetap putih mempertahankan ala polaroid */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background-image: url('banner.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            color: var(--earth-wood);
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(74, 59, 50, 0.6);
            margin: 15px 0 25px 0;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 1px;
            font-weight: 700;
            width: 100%;
        }

        @media (min-width: 480px) {
            h1 { font-size: 2.3rem; }
        }

        /* Layout Utama Kontainer (Responsif Vertikal di HP, Grid di PC) */
        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 850px;
            align-items: center;
        }

        @media (min-width: 768px) {
            .container {
                display: grid;
                grid-template-columns: 1.2fr 0.8fr;
                gap: 40px;
                align-items: start;
            }
        }

        /* Kotak Kamera Bertema Warm Earth */
        .camera-box {
            background: rgba(244, 240, 234, 0.95); /* Dasar krem lembut */
            border: 1px solid rgba(74, 59, 50, 0.15);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 30px rgba(74, 59, 50, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .video-wrapper {
            width: 100%;
            position: relative;
            aspect-ratio: 4/3;
            background-color: #2b2521;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            transition: filter 0.3s ease;
        }

        /* Panel Filter Warna */
        .filter-selector {
            width: 100%;
            margin: 15px 0 5px 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--earth-wood);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-options {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 6px;
            -webkit-overflow-scrolling: touch;
        }
        
        .filter-options::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 6px 14px;
            font-size: 12px;
            font-family: inherit;
            background: #fff;
            border: 1px solid #dcd6cd;
            color: var(--earth-wood);
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--earth-sage); /* Aktif jadi Hijau Sage */
            border-color: var(--earth-sage);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(112, 130, 102, 0.3);
        }

        /* Efek Filter Warna Hangat */
        .f-normal { filter: none; }
        .f-bw { filter: grayscale(100%) contrast(110%); }
        .f-sepia { filter: sepia(70%) contrast(95%) warm; }
        .f-vintage { filter: sepia(40%) saturate(110%) contrast(110%) brightness(95%); }
        .f-cyber { filter: hue-rotate(60deg) saturate(130%) sepia(20%); }

        #timer {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 4px 12px rgba(74, 59, 50, 0.4);
            pointer-events: none;
            z-index: 10;
        }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .flash-effect {
            animation: flash 0.4s ease-out;
        }

        @keyframes flash {
            0% { background: rgba(255,255,255,1); }
            100% { background: rgba(255,255,255,0); }
        }

        /* Tombol Utama Estetik */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 8px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button.main-btn {
            padding: 12px 15px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(74, 59, 50, 0.1);
        }

        button.main-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        #initBtn { background-color: var(--earth-wood); color: #fff; }
        #captureBtn { background-color: var(--earth-terracotta); color: white; }
        #downloadBtn { background-color: var(--earth-sage); color: white; }
        
        button.main-btn:disabled {
            background-color: #d2c9be !important;
            color: #9c9184 !important;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        /* STRIP POLAROID TETAP PUTIH BERSIH & MINIMALIS */
        .photobooth-frame {
            background-color: var(--frame-bg);
            width: 100%;
            max-width: 230px; 
            padding: 15px 15px 55px 15px;
            box-shadow: 0 12px 35px rgba(74, 59, 50, 0.15);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            position: relative;
            border: 1px solid #e6e1da;
        }

        .slot {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #f7f5f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bfae9c;
            font-size: 11px;
            overflow: hidden;
            border: 1px solid #f1ece5;
        }

        .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Input Catatan Teks Bawah Polaroid */
        .frame-footer-input {
            position: absolute;
            bottom: 15px;
            width: calc(100% - 30px);
            border: none;
            background: transparent;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: var(--earth-wood);
            outline: none;
            border-bottom: 1px dashed transparent;
        }

        .frame-footer-input:hover, .frame-footer-input:focus {
            border-bottom: 1px dashed #d2c9be;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <h1>🌿 WARM EARTH PHOTOBOOTH 🌿</h1>
    
    <div class="container">
        <div class="camera-box">
            <div class="video-wrapper">
                <video id="video" class="f-normal" autoplay playsinline></video>
                <div class="flash-overlay" id="flash"></div>
            </div>
            <div id="timer"></div>

            <div class="filter-selector">
                <span class="filter-label">🍂 Filter Efek Foto:</span>
                <div class="filter-options">
                    <button class="filter-btn active" onclick="setFilter('normal', this)">Normal</button>
                    <button class="filter-btn" onclick="setFilter('bw', this)">Muted B&W</button>
                    <button class="filter-btn" onclick="setFilter('sepia', this)">Warm Sepia</button>
                    <button class="filter-btn" onclick="setFilter('vintage', this)">Soft Vintage</button>
                    <button class="filter-btn" onclick="setFilter('cyber', this)">Nature Fresh</button>
                </div>
            </div>
            
            <div class="controls">
                <button id="initBtn" class="main-btn">1. Hubungkan Kamera</button>
                <div class="btn-group">
                    <button id="captureBtn" class="main-btn" disabled>2. Ambil Foto (3s)</button>
                    <button id="downloadBtn" class="main-btn" disabled>3. Simpan Gambar</button>
                </div>
            </div>
        </div>

        <div class="photobooth-frame" id="photoFrame">
            <div class="slot" id="slot1">POSE 1</div>
            <div class="slot" id="slot2">POSE 2</div>
            <div class="slot" id="slot3">POSE 3</div>
            <div class="slot" id="slot4">POSE 4</div>
            <input type="text" class="frame-footer-input" id="footerText" value="NATURE VIBES 🤎" placeholder="Tulis memo di sini...">
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const timerDisplay = document.getElementById('timer');
        const initBtn = document.getElementById('initBtn');
        const captureBtn = document.getElementById('captureBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const flash = document.getElementById('flash');
        const footerTextInput = document.getElementById('footerText');
        
        const slots = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3'),
            document.getElementById('slot4')
        ];

        let imgDataArray = [null, null, null, null];
        let activeFilter = 'normal';
        const ctx = canvas.getContext('2d');

        function setFilter(filterName, btn) {
            video.className = ''; 
            video.classList.add('f-' + filterName);
            activeFilter = filterName;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Akses Kamera
        initBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 }, 
                        facingMode: "user" 
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
                captureBtn.disabled = false;
                initBtn.disabled = true;
                initBtn.innerText = "Kamera Terhubung";
            } catch (err) {
                alert("Gagal memuat kamera. Pastikan izin kamera sudah diberikan di browser Anda.");
                console.error(err);
            }
        });

        // Sesi Rangkaian Foto (Timer 3 Detik)
        captureBtn.addEventListener('click', () => {
            captureBtn.disabled = true;
            downloadBtn.disabled = true;
            clearSlots();
            
            let currentSlot = 0;
            
            function startCountdown() {
                let count = 3;
                timerDisplay.innerText = count;
                
                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        timerDisplay.innerText = count;
                    } else {
                        clearInterval(interval);
                        timerDisplay.innerText = "";
                        
                        flash.classList.add('flash-effect');
                        setTimeout(() => flash.classList.remove('flash-effect'), 400);

                        takeSnapshot(currentSlot);
                        
                        currentSlot++;
                        if (currentSlot < 4) {
                            setTimeout(startCountdown, 1000);
                        } else {
                            setTimeout(() => {
                                timerDisplay.innerText = "FINISH!";
                                setTimeout(() => timerDisplay.innerText = "", 1500);
                                captureBtn.disabled = false;
                                downloadBtn.disabled = false;
                            }, 1000);
                        }
                    }
                }, 1000);
            }
            
            startCountdown();
        });

        function takeSnapshot(slotIndex) {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyFilterToCanvas(ctx);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imgUrl = canvas.toDataURL('image/jpeg');
            imgDataArray[slotIndex] = imgUrl;
            
            slots[slotIndex].innerHTML = `<img src="${imgUrl}" class="f-${activeFilter}" alt="Foto ${slotIndex + 1}">`;
        }

        function applyFilterToCanvas(context) {
            if (activeFilter === 'bw') context.filter = 'grayscale(100%) contrast(110%)';
            else if (activeFilter === 'sepia') context.filter = 'sepia(70%) contrast(95%)';
            else if (activeFilter === 'vintage') context.filter = 'sepia(40%) saturate(110%) contrast(110%) brightness(95%)';
            else if (activeFilter === 'cyber') context.filter = 'hue-rotate(60deg) saturate(130%) sepia(20%)';
            else context.filter = 'none';
        }

        function clearSlots() {
            slots.forEach((slot, index) => { slot.innerHTML = `POSE ${index + 1}`; });
            imgDataArray = [null, null, null, null];
        }

        // Menggabungkan Foto Menjadi Lembaran Strip Polaroid Putih Estetik (Anti-Gepeng)
        downloadBtn.addEventListener('click', () => {
            const finalWidth = 450;
            const padding = 25;
            const gap = 20;
            const photoWidth = finalWidth - (padding * 2);
            const photoHeight = photoWidth * (3/4); 
            const bottomSpace = 85; 
            
            const finalHeight = (padding * 2) + (photoHeight * 4) + (gap * 3) + bottomSpace;
            
            canvas.width = finalWidth;
            canvas.height = finalHeight;

            ctx.filter = 'none';
            ctx.fillStyle = "#ffffff"; 
            ctx.fillRect(0, 0, finalWidth, finalHeight);

            ctx.strokeStyle = "#e6e1da";
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, finalWidth - 2, finalHeight - 2);

            let loadedImages = 0;

            imgDataArray.forEach((dataUrl, index) => {
                if (!dataUrl) return;
                
                const img = new Image();
                img.src = dataUrl;
                img.onload = () => {
                    const yPos = padding + (index * (photoHeight + gap));
                    
                    ctx.save();
                    ctx.translate(padding + photoWidth, yPos);
                    ctx.scale(-1, 1); 
                    
                    applyFilterToCanvas(ctx);
                    
                    const targetRatio = photoWidth / photoHeight;
                    let sX = 0, sY = 0, sWidth = img.width, sHeight = img.height;

                    if (img.width / img.height > targetRatio) {
                        sWidth = img.height * targetRatio;
                        sX = (img.width - sWidth) / 2;
                    } else {
                        sHeight = img.width / targetRatio;
                        sY = (img.height - sHeight) / 2;
                    }

                    ctx.drawImage(img, sX, sY, sWidth, sHeight, 0, 0, photoWidth, photoHeight);
                    ctx.restore();

                    ctx.filter = 'none';
                    ctx.strokeStyle = "#f7f5f2";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(padding, yPos, photoWidth, photoHeight);
                    
                    loadedImages++;
                    
                    if (loadedImages === 4) {
                        ctx.fillStyle = "#4a3b32"; // Teks memo menggunakan warna kayu hangat
                        ctx.font = "bold 22px 'Courier New', Courier, monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(footerTextInput.value, finalWidth / 2, finalHeight - 35);

                        triggerDownload();
                    }
                };
            });
        });

        function triggerDownload() {
            const finalDataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'earthtone-polaroid-' + Date.now() + '.jpg';
            link.href = finalDataUrl;
            link.click();
        }
    </script>
</body>
</html>
